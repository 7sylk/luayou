services:
  - type: web
    name: luayou-backend-test
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DB_NAME
        value: luayou
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: REQUIRE_EMAIL_VERIFICATION
        value: true
